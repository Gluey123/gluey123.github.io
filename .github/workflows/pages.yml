name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.pick-url.outputs.page_url }}
    steps:
      # actions/deploy-pages intermittently fails with a generic
      # "Deployment failed, try again later." error (a known upstream
      # GitHub issue). Retrying a couple of times with backoff usually
      # succeeds without any human intervention.
      - name: Deploy attempt 1
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retry 1
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Deploy attempt 2
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30

      - name: Deploy attempt 3
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Pick successful deployment URL
        id: pick-url
        if: always()
        run: |
          URL="${{ steps.deploy1.outputs.page_url }}"
          if [ -z "$URL" ]; then URL="${{ steps.deploy2.outputs.page_url }}"; fi
          if [ -z "$URL" ]; then URL="${{ steps.deploy3.outputs.page_url }}"; fi
          echo "page_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Fail if all deploy attempts failed
        if: always() && steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' && steps.deploy3.outcome == 'failure'
        run: |
          echo "All 3 deployment attempts failed."
          exit 1
