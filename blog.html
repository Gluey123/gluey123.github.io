<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Colby</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="blog-page">

    <a class="blog-back" href="index.html">← back</a>

    <h1 class="blog-heading">Blog</h1>

    <ul class="entry-list">
      {% assign posts = site.blogs | sort: "date" | reverse %}
      {% for post in posts %}
      <li class="entry">
        <a class="entry-link" href="{{ post.url | relative_url }}">
          <span class="entry-date">{{ post.date | date: "%b %Y" }}</span>
          <span class="entry-body">
            <span class="entry-title">{{ post.title }}</span>
            {% if post.description %}
            <span class="entry-desc">{{ post.description }}</span>
            {% endif %}
          </span>
        </a>
      </li>
      {% else %}
      <li class="empty-entry">No blog posts yet.</li>
      {% endfor %}
    </ul>

  </main>

  <script src="script.js"></script>
</body>
</html>
