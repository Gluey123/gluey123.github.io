<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CHANGE: update the title -->
  <title>Post Title Colby</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>

  <div class="bg-texture"></div>

  <div class="post-page">

    <a class="blog-back" href="../blog.html">← blog</a>

    <!-- CHANGE: update date and title -->
    <p class="post-page-date">Mon YYYY</p>
    <h1 class="post-page-title">Post Title Here</h1>

    <div class="post-content">

      <!-- CHANGE: write your post below.
           Use <p> for paragraphs, <h2> for subheadings,
           <ul>/<li> for lists, <code> for inline code,
           <pre><code> for code blocks, <a href=""> for links. -->

      <p>
        Your first paragraph goes here. Write whatever you want.
        Keep paragraphs short and use spacing to breathe.
      </p>

      <p>
        Second paragraph. You can keep going like this forever.
      </p>

      <h2>A subheading if you need one</h2>

      <p>
        More content under the subheading.
      </p>

    </div>

    <div class="post-footer-nav">
      <a href="../blog.html">← all posts</a>
    </div>

  </div>

  <script src="../script.js"></script>
</body>
</html>
